server {
    listen 80;
    server_name handhelds.example.com;
    root /var/www/handheld-hub/public;
    index index.php;

    client_max_body_size 32m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /storage/handhelds/ {
        alias /var/www/handheld-hub/storage/handhelds/;
        expires 30d;
        access_log off;
    }

    location /admin/ {
        alias /var/www/handheld-hub/admin/;
        index index.php;
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        }
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\. {
        deny all;
    }
}
